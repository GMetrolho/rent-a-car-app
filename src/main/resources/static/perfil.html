<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AutoRent — Perfil</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .page-layout { display:flex; flex:1; }

    .content { flex:1; padding:24px; overflow:auto; }

    /* PERFIL CARD */
    .profile-header {
      background:#fff; border:1px solid var(--border);
      border-radius:16px; padding:32px;
      display:flex; align-items:center; gap:24px;
      margin-bottom:24px;
    }
    .profile-avatar {
      width:80px; height:80px; border-radius:50%;
      background:var(--blue); display:flex;
      align-items:center; justify-content:center;
      font-size:32px; color:#fff; font-weight:700;
      flex-shrink:0;
    }
    .profile-info h2 { font-size:20px; font-weight:700; color:var(--text); margin:0 0 4px; }
    .profile-info p  { font-size:14px; color:var(--text-muted); margin:0; }
    .badge-cargo {
      display:inline-block; margin-top:8px;
      padding:4px 12px; border-radius:20px;
      font-size:12px; font-weight:600; letter-spacing:0.5px;
    }
    .badge-ADMIN      { background:#dbeafe; color:#1d4ed8; }
    .badge-FUNCIONARIO{ background:#d1fae5; color:#065f46; }
    .badge-CLIENTE    { background:#fef3c7; color:#92400e; }

    /* SECÇÕES */
    .section-card {
      background:#fff; border:1px solid var(--border);
      border-radius:12px; padding:24px; margin-bottom:20px;
    }
    .section-card h3 {
      font-size:15px; font-weight:600; color:var(--text);
      margin-bottom:20px; padding-bottom:12px;
      border-bottom:1px solid var(--border);
    }

    /* FORM */
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    @media(max-width:600px){ .form-row { grid-template-columns:1fr; } }

    .info-field { display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
    .info-field label { font-size:12px; color:var(--text-muted); font-weight:500; }
    .info-field span  { font-size:14px; color:var(--text); font-weight:500; }

    .btn-editar {
      background:var(--blue); color:#fff; border:none;
      border-radius:8px; padding:10px 20px; font-size:13px;
      font-weight:500; cursor:pointer; transition:background 0.2s;
    }
    .btn-editar:hover { background:#1d4ed8; }
    .btn-cancelar {
      background:transparent; color:var(--text-muted);
      border:1px solid var(--border); border-radius:8px;
      padding:10px 16px; font-size:13px; cursor:pointer; margin-left:8px;
    }
    .btn-guardar {
      background:var(--orange); color:#fff; border:none;
      border-radius:8px; padding:10px 20px; font-size:13px;
      font-weight:500; cursor:pointer; transition:background 0.2s;
    }
    .btn-guardar:hover { background:#ea6c00; }

    /* ALUGUERES */
    .aluguer-item {
      border:1px solid var(--border); border-radius:10px;
      padding:16px; margin-bottom:12px;
      display:flex; align-items:center; justify-content:space-between;
      gap:12px;
    }
    .aluguer-item:last-child { margin-bottom:0; }
    .aluguer-veiculo { font-size:14px; font-weight:600; color:var(--text); }
    .aluguer-datas   { font-size:12px; color:var(--text-muted); margin-top:4px; }
    .aluguer-valor   { font-size:15px; font-weight:700; color:var(--blue); white-space:nowrap; }

    .badge-status {
      padding:4px 10px; border-radius:20px;
      font-size:11px; font-weight:600;
    }
    .badge-PENDENTE   { background:#fef3c7; color:#92400e; }
    .badge-ATIVA      { background:#d1fae5; color:#065f46; }
    .badge-CONCLUIDA  { background:#e0e7ff; color:#3730a3; }
    .badge-CANCELADO  { background:#fee2e2; color:#991b1b; }

    .empty-state { text-align:center; padding:30px; color:var(--text-muted); font-size:14px; }

    /* DANGER ZONE */
    .danger-zone {
      background:#fff5f5; border:1px solid #fecaca;
      border-radius:12px; padding:20px;
    }
    .danger-zone h3 { color:#dc2626; font-size:14px; font-weight:600; margin-bottom:8px; }
    .danger-zone p  { font-size:13px; color:var(--text-muted); margin-bottom:16px; }
    .btn-sair {
      background:#dc2626; color:#fff; border:none;
      border-radius:8px; padding:10px 20px; font-size:13px;
      font-weight:500; cursor:pointer; transition:background 0.2s;
    }
    .btn-sair:hover { background:#b91c1c; }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a class="navbar-brand" href="index.html">
      <svg viewBox="0 0 24 24"><path d="M5 11l1.5-4.5h11L19 11M3 17h1v1a1 1 0 002 0v-1h12v1a1 1 0 002 0v-1h1v-5l-2-6H5L3 12v5zm2.5-3a1 1 0 110-2 1 1 0 010 2zm9 0a1 1 0 110-2 1 1 0 010 2z"/></svg>
      AutoRent
    </a>
    <div class="navbar-actions" id="navActions"></div>
  </nav>

  <div class="page-layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-section">Menu</div>
      <a class="sidebar-link" href="index.html">🚗 Veículos</a>
      <div id="sidebarLogado" style="display:none;">
        <a class="sidebar-link" href="dashboard.html">📋 Dashboard</a>
      </div>
      <div style="margin-top:24px; border-top:1px solid #2d3f55; padding-top:16px;">
        <a class="sidebar-link" href="index.html">🏠 Página inicial</a>
      </div>
    </div>

    <!-- CONTEÚDO -->
    <div class="content">

      <!-- HEADER DO PERFIL -->
      <div class="profile-header">
        <div class="profile-avatar" id="avatarLetra">?</div>
        <div class="profile-info">
          <h2 id="perfilNome">—</h2>
          <p id="perfilEmail">—</p>
          <span class="badge-cargo" id="perfilCargo">—</span>
        </div>
      </div>

      <!-- INFORMAÇÕES DA CONTA -->
      <div class="section-card">
        <h3>📋 Informações da Conta</h3>

        <!-- MODO VISUALIZAÇÃO -->
        <div id="modoVer">
          <div class="form-row">
            <div class="info-field">
              <label>Nome</label>
              <span id="verNome">—</span>
            </div>
            <div class="info-field">
              <label>Email</label>
              <span id="verEmail">—</span>
            </div>
            <div class="info-field">
              <label>Tipo de Conta</label>
              <span id="verCargo">—</span>
            </div>
            <div class="info-field">
              <label>ID de Utilizador</label>
              <span id="verId">—</span>
            </div>
          </div>
          <button class="btn-editar" onclick="ativarEdicao()">✏️ Editar Dados</button>
        </div>

        <!-- MODO EDIÇÃO -->
        <div id="modoEditar" style="display:none;">
          <div class="alert-erro"    id="editErro"></div>
          <div class="alert-sucesso" id="editSucesso"></div>

          <div class="form-row" style="margin-bottom:16px;">
            <div>
              <label class="form-label-custom">Nome</label>
              <input type="text" class="form-control-custom" id="editNome"/>
            </div>
            <div>
              <label class="form-label-custom">Email</label>
              <input type="email" class="form-control-custom" id="editEmail"/>
            </div>
          </div>
          <div class="form-row" style="margin-bottom:20px;">
            <div>
              <label class="form-label-custom">Nova Password <span style="color:var(--text-muted);font-size:11px;">(deixa em branco para não alterar)</span></label>
              <input type="password" class="form-control-custom" id="editPassword" placeholder="Mínimo 8 caracteres"/>
            </div>
            <div>
              <label class="form-label-custom">Confirmar Password</label>
              <input type="password" class="form-control-custom" id="editConfirmar" placeholder="Repete a password"/>
            </div>
          </div>
          <button class="btn-guardar" onclick="guardarDados()">💾 Guardar</button>
          <button class="btn-cancelar" onclick="cancelarEdicao()">Cancelar</button>
        </div>
      </div>

      <!-- HISTÓRICO DE ALUGUERES -->
      <div class="section-card">
        <h3>🚗 Histórico de Alugueres</h3>
        <div id="listaAlugueres">
          <div class="empty-state">A carregar...</div>
        </div>
      </div>

      <!-- SAIR -->
      <div class="danger-zone">
        <h3>⚠️ Terminar Sessão</h3>
        <p>Ao sair terás de fazer login novamente para aceder à tua conta.</p>
        <button class="btn-sair" onclick="sair()">🚪 Sair da Conta</button>
      </div>

    </div>
  </div>

  <script>
    const utilizador = JSON.parse(sessionStorage.getItem('utilizador'));

    // Redireciona se não estiver logado
    if (!utilizador) {
      window.location.href = 'login.html';
    }

    // NAVBAR
    const navActions = document.getElementById('navActions');
    const acess = utilizador.cargo === 'ADMIN' || utilizador.cargo === 'FUNCIONARIO';
    navActions.innerHTML = `
      <span class="navbar-user">👤 ${utilizador.nome}</span>
      ${acess ? '<a href="dashboard.html" class="btn-outline-custom">Dashboard</a>' : ''}
      <button class="btn-danger-custom" onclick="sair()">Terminar Sessão</button>
    `;

    // PREENCHER PERFIL
    function preencherPerfil(u) {
      document.getElementById('avatarLetra').textContent = u.nome.charAt(0).toUpperCase();
      document.getElementById('perfilNome').textContent  = u.nome;
      document.getElementById('perfilEmail').textContent = u.email;

      const badgeCargo = document.getElementById('perfilCargo');
      badgeCargo.textContent = u.cargo;
      badgeCargo.className   = `badge-cargo badge-${u.cargo}`;

      document.getElementById('verNome').textContent  = u.nome;
      document.getElementById('verEmail').textContent = u.email;
      document.getElementById('verCargo').textContent = u.cargo;
      document.getElementById('verId').textContent    = u.id;

      document.getElementById('editNome').value  = u.nome;
      document.getElementById('editEmail').value = u.email;
    }

    preencherPerfil(utilizador);

    // EDIÇÃO
    function ativarEdicao() {
      document.getElementById('modoVer').style.display    = 'none';
      document.getElementById('modoEditar').style.display = 'block';
      document.getElementById('editErro').style.display    = 'none';
      document.getElementById('editSucesso').style.display = 'none';
    }

    function cancelarEdicao() {
      document.getElementById('modoVer').style.display    = 'block';
      document.getElementById('modoEditar').style.display = 'none';
    }

    function guardarDados() {
      const nome      = document.getElementById('editNome').value.trim();
      const email     = document.getElementById('editEmail').value.trim();
      const password  = document.getElementById('editPassword').value.trim();
      const confirmar = document.getElementById('editConfirmar').value.trim();
      const erro      = document.getElementById('editErro');
      const sucesso   = document.getElementById('editSucesso');

      erro.style.display = sucesso.style.display = 'none';

      if (!nome || !email) {
        erro.innerText = 'Nome e email são obrigatórios!';
        erro.style.display = 'block';
        return;
      }
      if (password && password.length < 8) {
        erro.innerText = 'A password deve ter pelo menos 8 caracteres!';
        erro.style.display = 'block';
        return;
      }
      if (password && password !== confirmar) {
        erro.innerText = 'As passwords não coincidem!';
        erro.style.display = 'block';
        return;
      }

      const body = {
        id: utilizador.id,
        nome,
        email,
        cargo: utilizador.cargo,
        password: password || utilizador.password
      };

      fetch(`/utilizadores/${utilizador.id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      })
      .then(res => {
        if (!res.ok) return res.text().then(msg => { throw new Error(msg); });
        return res.json();
      })
      .then(u => {
        sessionStorage.setItem('utilizador', JSON.stringify(u));
        preencherPerfil(u);
        sucesso.innerText = 'Dados atualizados com sucesso!';
        sucesso.style.display = 'block';
        setTimeout(() => cancelarEdicao(), 1500);
      })
      .catch(err => {
        erro.innerText = err.message || 'Erro ao guardar dados!';
        erro.style.display = 'block';
      });
    }

    // HISTÓRICO DE ALUGUERES
    fetch('/alugueres')
      .then(r => r.json())
      .then(alugueres => {
        const meus = alugueres.filter(a => a.cliente?.id === utilizador.id);
        const lista = document.getElementById('listaAlugueres');

        if (meus.length === 0) {
          lista.innerHTML = '<div class="empty-state">Ainda não tens alugueres.</div>';
          return;
        }

        lista.innerHTML = meus.map(a => `
          <div class="aluguer-item">
            <div>
              <div class="aluguer-veiculo">🚗 ${a.veiculo?.marca || '—'} ${a.veiculo?.modelo || ''}</div>
              <div class="aluguer-datas">
                📅 ${formatarData(a.dataLevantamento)} → ${formatarData(a.dataDevolucao)}
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:12px;">
              <span class="badge-status badge-${a.statusAluguer}">${a.statusAluguer}</span>
              <span class="aluguer-valor">${a.valorFinalPrevisto?.toFixed(2)}€</span>
            </div>
          </div>
        `).join('');
      })
      .catch(() => {
        document.getElementById('listaAlugueres').innerHTML =
          '<div class="empty-state">Erro ao carregar alugueres.</div>';
      });

    function formatarData(data) {
      if (!data) return '—';
      return new Date(data).toLocaleDateString('pt-PT', { day:'2-digit', month:'2-digit', year:'numeric' });
    }

    function sair() {
      sessionStorage.removeItem('utilizador');
      window.location.href = 'login.html';
    }
  </script>

</body>
</html>
