<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AutoRent — Registar</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .main-wrapper { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 16px; }
    .auth-card { background:#fff; border:1px solid var(--border); border-radius:16px; padding:40px; width:100%; max-width:420px; }
    .auth-card h1 { font-size:22px; font-weight:600; color:var(--text); margin-bottom:4px; }
    .auth-card .sub { font-size:14px; color:var(--text-muted); margin-bottom:28px; }
    .btn-registar { background:var(--orange); color:#fff; border:none; border-radius:8px; padding:12px; font-size:15px; font-weight:500; width:100%; cursor:pointer; transition:background 0.2s; margin-top:8px; }
    .btn-registar:hover { background:#ea6c00; }
    .btn-login-link { background:transparent; color:var(--blue); border:1.5px solid var(--blue); border-radius:8px; padding:11px; font-size:14px; font-weight:500; width:100%; cursor:pointer; transition:all 0.2s; text-align:center; text-decoration:none; display:block; }
    .btn-login-link:hover { background:var(--blue); color:#fff; }
    .divider { display:flex; align-items:center; gap:12px; margin:20px 0; color:var(--text-muted); font-size:13px; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }
  </style>
</head>
<body>

  <nav class="navbar">
    <a class="navbar-brand" href="index.html">
      <svg viewBox="0 0 24 24"><path d="M5 11l1.5-4.5h11L19 11M3 17h1v1a1 1 0 002 0v-1h12v1a1 1 0 002 0v-1h1v-5l-2-6H5L3 12v5zm2.5-3a1 1 0 110-2 1 1 0 010 2zm9 0a1 1 0 110-2 1 1 0 010 2z"/></svg>
      AutoRent
    </a>
  </nav>

  <div class="main-wrapper">
    <div class="auth-card">
      <h1>Criar conta</h1>
      <p class="sub">Regista-te para fazer reservas</p>

      <div class="alert-erro"    id="erro"></div>
      <div class="alert-sucesso" id="sucesso"></div>

      <div class="mb-3">
        <label class="form-label-custom">Nome completo</label>
        <input type="text" class="form-control-custom" id="nome" placeholder="João Silva"/>
      </div>
      <div class="mb-3">
        <label class="form-label-custom">Email</label>
        <input type="email" class="form-control-custom" id="email" placeholder="email@exemplo.com"/>
      </div>
      <div class="mb-3">
        <label class="form-label-custom">Password</label>
        <input type="password" class="form-control-custom" id="password" placeholder="Mínimo 8 caracteres"/>
      </div>
      <div class="mb-3">
        <label class="form-label-custom">Confirmar password</label>
        <input type="password" class="form-control-custom" id="confirmar" placeholder="Repete a password"/>
      </div>

      <button class="btn-registar" onclick="registar()">Criar conta</button>
      <div class="divider">ou</div>
      <a class="btn-login-link" href="login.html">Já tens conta? Entra aqui</a>
    </div>
  </div>

  <script>
    function registar() {
      const nome      = document.getElementById('nome').value.trim();
      const email     = document.getElementById('email').value.trim();
      const password  = document.getElementById('password').value.trim();
      const confirmar = document.getElementById('confirmar').value.trim();
      const erro      = document.getElementById('erro');
      const sucesso   = document.getElementById('sucesso');

      erro.style.display    = 'none';
      sucesso.style.display = 'none';

      if (!nome || !email || !password || !confirmar) {
        erro.innerText = 'Preenche todos os campos!';
        erro.style.display = 'block';
        return;
      }
      if (password.length < 8) {
        erro.innerText = 'A password deve ter pelo menos 8 caracteres!';
        erro.style.display = 'block';
        return;
      }
      if (password !== confirmar) {
        erro.innerText = 'As passwords não coincidem!';
        erro.style.display = 'block';
        return;
      }

      fetch('/utilizadores/registar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, email, password, cargo: 'CLIENTE' })
      })
      .then(res => {
        if (!res.ok) return res.text().then(msg => { throw new Error(msg); });
        return res.json();
      })
      .then(() => {
        sucesso.innerText = 'Conta criada com sucesso! A redirecionar...';
        sucesso.style.display = 'block';
        setTimeout(() => window.location.href = 'login.html', 1500);
      })
      .catch(err => {
        erro.innerText = err.message || 'Erro ao criar conta!';
        erro.style.display = 'block';
      });
    }
  </script>
</body>
</html>
