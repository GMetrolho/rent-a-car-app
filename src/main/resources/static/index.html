<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AutoRent — Veículos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .page-layout { display:flex; flex:1; }
    .filters-bar { background:#fff; border:1px solid var(--border); border-radius:12px; padding:16px 20px; margin-bottom:20px; display:flex; gap:14px; flex-wrap:wrap; align-items:flex-end; }
    .filter-group { display:flex; flex-direction:column; gap:6px; min-width:130px; }
    .filter-group label { font-size:12px; color:var(--text-muted); font-weight:500; }
    .filter-group select { border:1px solid var(--border); border-radius:8px; padding:8px 12px; font-size:13px; background:#fff; color:var(--text); cursor:pointer; }
    .btn-filtrar { background:var(--blue); color:#fff; border:none; border-radius:8px; padding:9px 20px; font-size:13px; cursor:pointer; }
    .btn-filtrar:hover { background:#1d4ed8; }
    .btn-limpar { background:transparent; color:var(--text-muted); border:1px solid var(--border); border-radius:8px; padding:9px 16px; font-size:13px; cursor:pointer; }

    .cars-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:16px; }
    .car-card { background:#fff; border:1px solid var(--border); border-radius:12px; padding:16px; display:flex; flex-direction:column; gap:10px; transition:box-shadow 0.2s; cursor:pointer; }
    .car-card:hover { box-shadow:0 4px 20px rgba(0,0,0,0.08); }
    .car-img { background:#f1f5f9; border-radius:8px; height:100px; display:flex; align-items:center; justify-content:center; color:#94a3b8; font-size:42px; overflow:hidden; }
    .car-img img { width:100%; height:100%; object-fit:cover; border-radius:8px; }
    .car-name { font-size:15px; font-weight:600; color:var(--text); }
    .car-detail { font-size:12px; color:var(--text-muted); display:flex; align-items:center; gap:6px; }
    .car-footer { display:flex; align-items:center; justify-content:space-between; }
    .car-price { font-size:16px; font-weight:600; color:var(--blue); }
    .btn-reservar { background:var(--orange); color:#fff; border:none; border-radius:8px; padding:9px; font-size:13px; cursor:pointer; width:100%; font-weight:500; }
    .btn-reservar:hover { background:#ea6c00; }
    .btn-reservar:disabled { opacity:0.4; cursor:not-allowed; }
    .content { flex:1; padding:24px; overflow:auto; }
    .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .section-title { font-size:16px; font-weight:600; color:var(--text); }
    .cars-count { font-size:13px; color:var(--text-muted); }
    .empty-state { text-align:center; padding:40px; color:var(--text-muted); font-size:14px; }

    /* POP-UP VEICULO */
    .popup-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
    .popup-img { width:100%; height:180px; object-fit:cover; border-radius:10px; background:#f1f5f9; display:flex; align-items:center; justify-content:center; font-size:60px; margin-bottom:16px; overflow:hidden; }
    .popup-img img { width:100%; height:100%; object-fit:cover; }
    .popup-field { background:#f8fafc; border-radius:8px; padding:10px 14px; }
    .popup-field-label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
    .popup-field-value { font-size:14px; font-weight:500; color:var(--text); }
    .popup-price { font-size:22px; font-weight:700; color:var(--blue); margin-bottom:16px; }
    .popup-badges { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }

    /* TAG CO2 */
    .co2-tag { background:#dcfce7; color:#166534; font-size:12px; padding:4px 10px; border-radius:20px; }
    .co2-tag.alto { background:#fee2e2; color:#991b1b; }
    .co2-tag.medio { background:#fef9c3; color:#854d0e; }
  </style>
</head>
<body>

  <nav class="navbar">
    <a class="navbar-brand" href="index.html">
      <svg viewBox="0 0 24 24"><path d="M5 11l1.5-4.5h11L19 11M3 17h1v1a1 1 0 002 0v-1h12v1a1 1 0 002 0v-1h1v-5l-2-6H5L3 12v5zm2.5-3a1 1 0 110-2 1 1 0 010 2zm9 0a1 1 0 110-2 1 1 0 010 2z"/></svg>
      AutoRent
    </a>
    <div class="navbar-actions" id="navActions"></div>
  </nav>

  <div class="page-layout">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-section">Menu</div>
      <a class="sidebar-link active" href="index.html">🚗 Veículos</a>
      <div id="sidebarDashboard" style="display:none;">
        <div class="sidebar-link" id="dashToggle" onclick="toggleDash()" style="display:flex; align-items:center; justify-content:space-between; cursor:pointer; user-select:none;">
          <span>📋 Dashboard</span>
          <span id="dashArrow" style="font-size:11px; transition:transform 0.2s;">▾</span>
        </div>
        <div id="dashSubMenu" style="display:none; border-left:2px solid #3b5270; margin-left:18px; margin-top:2px;">
        </div>
      </div>
    </div>

    <div class="content">
      <div class="filters-bar">
        <div class="filter-group">
          <label for="filtroMotor">Tipo de Motor</label>
          <select id="filtroMotor" onchange="onMotorChange()">
            <option value="">Todos</option>
            <option value="COMBUSTAO">Combustão</option>
            <option value="HIBRIDO">Híbrido</option>
            <option value="ELETRICO">Elétrico</option>
          </select>
        </div>
        <div class="filter-group" id="grupoCaixa">
          <label for="filtroCaixa">Caixa</label>
          <select id="filtroCaixa">
            <option value="">Todas</option>
            <option value="MANUAL">Manual</option>
            <option value="AUTOMATICO">Automático</option>
          </select>
        </div>
        <div class="filter-group" id="grupoCombustao">
          <label for="filtroCombustao">Combustível</label>
          <select id="filtroCombustao">
            <option value="">Todos</option>
            <option value="GASOLINA">Gasolina</option>
            <option value="GASOLEO">Gasóleo</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filtroCategoria">Categoria</label>
          <select id="filtroCategoria"><option value="">Todas</option></select>
        </div>
        <div class="filter-group">
          <label for="filtroStatus">Estado</label>
          <select id="filtroStatus">
            <option value="">Todos</option>
            <option value="DISPONIVEL">Disponível</option>
            <option value="ALUGADO">Alugado</option>
            <option value="MANUTENCAO">Manutenção</option>
          </select>
        </div>
        <button class="btn-filtrar" onclick="filtrarVeiculos()">🔍 Filtrar</button>
        <button class="btn-limpar"  onclick="limparFiltros()">Limpar</button>
      </div>

      <div class="section-header">
        <span class="section-title">Veículos</span>
        <span class="cars-count" id="carsCount"></span>
      </div>
      <div class="cars-grid" id="carsGrid">
        <div class="empty-state">A carregar veículos...</div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modalDetalhes">
    <div class="modal-box" style="max-width:520px;">
      <button class="modal-close" onclick="fecharDetalhes()">✕</button>
      <div id="popupImagem" class="popup-img">🚗</div>
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
        <div class="modal-title" id="popupNome" style="margin-bottom:0;"></div>
        <span id="popupBadge"></span>
      </div>
      <div class="popup-price" id="popupPreco"></div>
      <div class="popup-badges" id="popupBadges"></div>
      <div class="popup-grid" id="popupGrid"></div>
      <button class="btn-orange-custom w-100" id="popupBtnReservar" onclick="reservarDoPopup()">Reservar</button>
    </div>
  </div>

  <style>
    .cal-wrap { user-select:none; }
    .cal-inputs { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
    .cal-input-box { background:#f8fafc; border:1.5px solid var(--border); border-radius:10px; padding:8px 12px; cursor:pointer; transition:border-color 0.2s; }
    .cal-input-box:hover { border-color:var(--blue); }
    .cal-input-box.active { border-color:var(--blue); background:#eff6ff; }
    .cal-input-label { font-size:10px; color:var(--text-muted); font-weight:500; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:2px; }
    .cal-input-val { font-size:13px; font-weight:600; color:var(--text); }
    .cal-input-val.placeholder { color:#94a3b8; font-weight:400; }

    .cal-popup { background:#fff; border:1px solid var(--border); border-radius:14px; box-shadow:0 2px 8px rgba(0,0,0,0.04); overflow:hidden; flex: 1; }
    .cal-header { display:flex; align-items:center; justify-content:space-between; padding:10px 14px 8px; border-bottom:1px solid var(--border); }
    .cal-month-label { font-size:13px; font-weight:700; color:var(--text); }
    .cal-nav { background:none; border:none; width:26px; height:26px; border-radius:6px; cursor:pointer; font-size:13px; color:var(--text-muted); display:flex; align-items:center; justify-content:center; transition:background 0.15s; }
    .cal-nav:hover { background:#f1f5f9; color:var(--text); }
    .cal-grid { padding:8px 10px; }
    .cal-weekdays { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:4px; }
    .cal-weekdays span { text-align:center; font-size:11px; font-weight:600; color:var(--text-muted); padding:2px 0; }

    /* CORREÇÃO DO TAMANHO DOS DIAS: Bloqueado estruturalmente para nunca esticar o container */
    .cal-days { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
    .cal-day {
      aspect-ratio:1;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:13px;
      border-radius:8px;
      cursor:pointer;
      transition:background 0.15s, color 0.15s;
      color:var(--text);
      position:relative;
      box-sizing: border-box !important;
      margin: 0 !important;
      padding: 0 !important;
    }
    .cal-day:hover:not(.disabled):not(.empty) { background:#f1f5f9; }

    /* Classes de estado sincronizadas para não alterar margens ou preenchimento */
    .cal-day.disabled { color:#cbd5e1; cursor:not-allowed; background: none !important; border: none !important; }
    .cal-day.empty { cursor:default; background: none !important; border: none !important; }
    .cal-day.start { background:var(--blue) !important; color:#fff !important; border-radius:8px 0 0 8px; }
    .cal-day.end   { background:var(--blue) !important; color:#fff !important; border-radius:0 8px 8px 0; }
    .cal-day.start.end { border-radius:8px !important; }
    .cal-day.in-range { background:#dbeafe !important; color:var(--blue) !important; border-radius:0; }
    .cal-day.today::after { content:''; position:absolute; bottom:3px; left:50%; transform:translateX(-50%); width:4px; height:4px; border-radius:50%; background:var(--orange); }
    .cal-day.start.today::after, .cal-day.end.today::after { background:#fff; }

    .cal-hint { font-size:11px; color:var(--text-muted); text-align:center; padding:4px 0 0; }

    /* SELETOR DE HORA LATERAL */
    .time-sidebar-box {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      width: 170px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      justify-content: center;
    }
    .time-select-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .time-select-group label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .time-dropdown {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 13px;
      font-weight: 600;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      width: 100%;
    }
    .time-dropdown:focus {
      border-color: var(--blue);
      outline: none;
    }
  </style>

  <div class="modal-overlay" id="modalReserva">
    <div class="modal-box" style="max-width:620px; width:95%; max-height: 90vh; padding:0; overflow:hidden; border-radius:16px; display: flex; flex-direction: column;">

      <div style="background:var(--blue); padding:16px 24px; position:relative; flex-shrink: 0;">
        <button onclick="fecharReserva()" style="position:absolute;top:14px;right:14px;color:#fff;opacity:0.8;background:rgba(255,255,255,0.15);border:none;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.7);margin-bottom:2px;">Nova Reserva</div>
        <div style="font-size:18px;font-weight:700;color:#fff;" id="modalVeiculoNome">—</div>
        <div style="font-size:13px;color:rgba(255,255,255,0.75);margin-top:2px;" id="modalVeiculoPreco">—</div>
      </div>

      <div style="padding:16px 24px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 12px;">
        <div class="alert-erro"    id="modalErro"    style="margin-bottom:0; display:none;"></div>
        <div class="alert-sucesso" id="modalSucesso" style="margin-bottom:0; display:none;"></div>

        <div class="cal-wrap">
          <div class="cal-inputs">
            <div class="cal-input-box" id="boxLevantamento" onclick="calAbrirPicker('levantamento')">
              <div class="cal-input-label">🛫 Levantamento</div>
              <div class="cal-input-val placeholder" id="displayLevantamento">Escolher data</div>
            </div>
            <div class="cal-input-box" id="boxDevolucao" onclick="calAbrirPicker('devolucao')">
              <div class="cal-input-label">🛬 Devolução</div>
              <div class="cal-input-val placeholder" id="displayDevolucao">Escolher data</div>
            </div>
          </div>

          <div style="display: flex; gap: 14px; align-items: stretch;">

            <div class="cal-popup">
              <div class="cal-header">
                <button class="cal-nav" onclick="calNavMes(-1)">&#8249;</button>
                <span class="cal-month-label" id="calMonthLabel"></span>
                <button class="cal-nav" onclick="calNavMes(1)">&#8250;</button>
              </div>
              <div class="cal-grid">
                <div class="cal-weekdays">
                  <span>Dom</span><span>Seg</span><span>Ter</span><span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span>
                </div>
                <div class="cal-days" id="calDays"></div>
              </div>
              <div class="cal-hint" id="calHint">Seleciona a data de levantamento</div>
            </div>

            <div class="time-sidebar-box">
              <div class="time-select-group">
                <label>Hora Levantamento</label>
                <select id="selectHoraLev" class="time-dropdown" onchange="onSelectHoraChange('levantamento')">
                </select>
              </div>

              <div style="border-top: 1px dashed var(--border); margin: 2px 0;"></div>

              <div class="time-select-group">
                <label>Hora Devolução</label>
                <select id="selectHoraDev" class="time-dropdown" onchange="onSelectHoraChange('devolucao')">
                </select>
              </div>
            </div>

          </div>
        </div>

        <div id="resumoReserva" style="display:none; background:#f8fafc; border:1px solid var(--border); border-radius:12px; padding:12px;">
          <div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Resumo</div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
            <span style="font-size:12px;color:var(--text-muted);">Duração</span>
            <span style="font-size:12px;font-weight:600;color:var(--text);" id="resumoDias">—</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
            <span style="font-size:12px;color:var(--text-muted);">Preço por dia</span>
            <span style="font-size:12px;font-weight:600;color:var(--text);" id="resumoPrecoDia">—</span>
          </div>
          <div style="border-top:1px solid var(--border);margin:6px 0;"></div>
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:13px;font-weight:600;color:var(--text);">Total estimado</span>
            <span style="font-size:16px;font-weight:700;color:var(--blue);" id="resumoTotal">—</span>
          </div>
        </div>
      </div>

      <div style="padding: 12px 24px; background: #fff; border-top: 1px solid var(--border); flex-shrink: 0;">
        <button class="btn-orange-custom w-100" id="btnConfirmarReserva" onclick="confirmarReserva()" disabled style="opacity:0.5; padding: 10px; font-weight: 600; font-size: 14px;">
          Confirmar Reserva
        </button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    let todosVeiculos      = [];
    let veiculoSelecionado = null;
    const utilizadorLogado = JSON.parse(sessionStorage.getItem('utilizador'));

    if (utilizadorLogado) {
      const isAdmin      = utilizadorLogado.cargo === 'ADMIN';
      const isFuncionario = utilizadorLogado.cargo === 'FUNCIONARIO';
      const isStaff      = isAdmin || isFuncionario;

      if (isStaff) {
        document.getElementById('sidebarDashboard').style.display = 'block';
        const dashUrl  = isAdmin ? 'admin_dashboard.html' : 'dashboard.html';

        const abas = isAdmin
          ? [
              { icon: '📊', label: 'Overview',      secao: 'overview'      },
              { icon: '📋', label: 'Alugueres',     secao: 'alugueres'     },
              { icon: '🚗', label: 'Veículos',      secao: 'veiculos'      },
              { icon: '🗂️', label: 'Categorias',    secao: 'categorias'    },
              { icon: '👥', label: 'Utilizadores',  secao: 'utilizadores'  },
            ]
          : [
              { icon: '📋', label: 'Alugueres',     secao: 'alugueres'     },
              { icon: '🚗', label: 'Veículos',      secao: 'veiculos'      },
              { icon: '🗂️', label: 'Categorias',    secao: 'categorias'    },
            ];

        const sub = document.getElementById('dashSubMenu');
        sub.innerHTML = abas.map(a =>
          `<a class="sidebar-link" style="font-size:13px; padding:7px 12px;"
              href="${dashUrl}?s=${a.secao}">${a.icon} ${a.label}</a>`
        ).join('');
      }
    }

    function toggleDash() {
      const sub   = document.getElementById('dashSubMenu');
      const arrow = document.getElementById('dashArrow');
      const open  = sub.style.display !== 'none';
      sub.style.display   = open ? 'none' : 'block';
      arrow.style.transform = open ? '' : 'rotate(-90deg)';
    }

    fetch('/categorias').then(r => r.json()).then(cats => {
      const sel = document.getElementById('filtroCategoria');
      cats.forEach(c => { const o = document.createElement('option'); o.value = c.id; o.textContent = c.nome; sel.appendChild(o); });
    }).catch(() => {});

    function carregarVeiculos() {
      fetch('/veiculos').then(r => r.json()).then(v => { todosVeiculos = v; renderVeiculos(v); })
        .catch(() => { document.getElementById('carsGrid').innerHTML = '<div class="empty-state">Erro ao carregar veículos.</div>'; });
    }

    function renderVeiculos(veiculos) {
      const grid = document.getElementById('carsGrid');
      document.getElementById('carsCount').textContent = `${veiculos.length} veículo(s)`;
      if (!veiculos.length) { grid.innerHTML = '<div class="empty-state">Nenhum veículo encontrado.</div>'; return; }

      grid.innerHTML = veiculos.map(v => `
        <div class="car-card" onclick='abrirDetalhes(${JSON.stringify(v).replace(/"/g,"&quot;")})'>
          <div class="car-img">
            <img src="img/${v.marca.toLowerCase()}_${v.modelo.toLowerCase().replace(/\s+/g,'_')}.png"
                style="width:100%;height:100%;object-fit:cover;border-radius:8px;"
                onerror="this.parentElement.innerHTML='🚗'"/>
          </div>
          <div class="car-name">${v.marca} ${v.modelo}</div>
          <div class="car-detail">⚙️ ${v.tipoCaixa || '—'}</div>
          <div class="car-detail">📅 ${v.ano}</div>
          <div class="car-footer">
            <span class="car-price">${v.precoDiario}€/dia</span>
            <span class="${badgeStatus(v.status)}">${v.status}</span>
          </div>
          <button class="btn-reservar" ${v.status !== 'DISPONIVEL' ? 'disabled' : ''}
            onclick="event.stopPropagation(); abrirReserva(${JSON.stringify(v).replace(/"/g,'&quot;')})">
            ${v.status === 'DISPONIVEL' ? 'Reservar' : 'Indisponível'}
          </button>
        </div>`).join('');
    }

    function badgeStatus(s) {
      return { DISPONIVEL:'badge-disponivel', ALUGADO:'badge-alugado', MANUTENCAO:'badge-manutencao' }[s] || 'badge-cliente';
    }

    function onMotorChange() {
      const motor = document.getElementById('filtroMotor').value;
      const grupoCombustao = document.getElementById('grupoCombustao');
      const grupoCaixa = document.getElementById('grupoCaixa');
      const filtroCaixa = document.getElementById('filtroCaixa');

      if (motor === 'ELETRICO') {
        grupoCombustao.style.display = 'none';
        document.getElementById('filtroCombustao').value = '';
        filtroCaixa.value = 'AUTOMATICO'
        grupoCaixa.style.display = 'none';
      } else {
        grupoCombustao.style.display = 'flex';
        grupoCaixa.style.display = 'flex';
      }
    }

    function filtrarVeiculos() {
      const motor     = document.getElementById('filtroMotor').value;
      const caixa     = document.getElementById('filtroCaixa').value;
      const combustao = document.getElementById('filtroCombustao').value;
      const categoria = document.getElementById('filtroCategoria').value;
      const status    = document.getElementById('filtroStatus').value;
      renderVeiculos(todosVeiculos.filter(v =>
        (!motor     || v.tipoMotor     === motor)     &&
        (!caixa     || v.tipoCaixa     === caixa)     &&
        (!combustao || v.tipoCombustao === combustao) &&
        (!categoria || v.categoria?.id == categoria)  &&
        (!status    || v.status        === status)));
    }

    function limparFiltros() {
      ['filtroMotor','filtroCaixa','filtroCombustao','filtroCategoria','filtroStatus'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('grupoCombustao').style.display = 'flex';
      document.getElementById('grupoCaixa').style.display = 'flex';
      renderVeiculos(todosVeiculos);
    }

    function abrirDetalhes(v) {
      const img = document.getElementById('popupImagem');
      img.innerHTML = `<img src="img/${v.marca.toLowerCase()}_${v.modelo.toLowerCase().replace(/\s+/g,'_')}.png" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML='🚗'"/>`;

      document.getElementById('popupNome').textContent  = `${v.marca} ${v.modelo}`;
      document.getElementById('popupBadge').innerHTML   = `<span class="${badgeStatus(v.status)}">${v.status}</span>`;
      document.getElementById('popupPreco').textContent = `${v.precoDiario}€ / dia`;

      let badges = `<span style="background:#dbeafe;color:#1e40af;font-size:12px;padding:4px 10px;border-radius:20px;">${v.tipoCaixa || '—'}</span>`;
      if (v.tipoMotor) badges += `<span style="background:#f1f5f9;color:#475569;font-size:12px;padding:4px 10px;border-radius:20px;">${v.tipoMotor}</span>`;
      if (v.co2) {
        const cls = v.co2 > 150 ? 'alto' : v.co2 > 100 ? 'medio' : '';
        badges += `<span class="co2-tag ${cls}">CO₂: ${v.co2} g/km</span>`;
      }
      document.getElementById('popupBadges').innerHTML = badges;

      const campos = [
        ['📅 Ano',        v.ano        || '—'],
        ['⛽ Combustível', v.tipoCombustao || (v.tipoMotor === 'ELETRICO' ? 'Elétrico' : '—')],
        ['🔧 Cilindrada', v.cilindrada ? `${v.cilindrada} cc` : '—'],
        ['⚡ Potência',   v.potencia   ? `${v.potencia} cv`   : '—'],
        ['🗂️ Categoria',  v.categoria?.nome || '—'],
        ['🔢 Matrícula',  v.matricula  || '—'],
      ];
      document.getElementById('popupGrid').innerHTML = campos.map(([l, val]) => `
        <div class="popup-field"><div class="popup-field-label">${l}</div><div class="popup-field-value">${val}</div></div>`).join('');

      const btn = document.getElementById('popupBtnReservar');
      if (v.status === 'DISPONIVEL') {
        btn.disabled = false; btn.style.opacity = '1';
        btn.textContent = 'Reservar';
      } else {
        btn.disabled = true; btn.style.opacity = '0.4';
        btn.textContent = 'Indisponível';
      }

      veiculoSelecionado = v;
      document.getElementById('modalDetalhes').classList.add('open');
    }

    function fecharDetalhes() { document.getElementById('modalDetalhes').classList.remove('open'); }

    function reservarDoPopup() {
      fecharDetalhes();
      abrirReserva(veiculoSelecionado);
    }

    // ─── CALENDAR PICKER CUSTOM ──────────────
    let calMes, calAno, calSelecionar, calDataLev, calDataDev;
    let calHoraLev = { h: 9, m: 0 };
    let calHoraDev = { h: 9, m: 0 };

    function carregarDropdownsHoras() {
      const dropLev = document.getElementById('selectHoraLev');
      const dropDev = document.getElementById('selectHoraDev');
      let htmlOptions = '';

      for (let h = 0; h < 24; h++) {
        for (let m = 0; m < 60; m += 15) {
          const hh = String(h).padStart(2, '0');
          const mm = String(m).padStart(2, '0');
          const selected = (h === 9 && m === 0) ? 'selected' : '';
          htmlOptions += `<option value="${h}:${m}" ${selected}>${hh}:${mm}</option>`;
        }
      }
      dropLev.innerHTML = htmlOptions;
      dropDev.innerHTML = htmlOptions;
    }

    function onSelectHoraChange(tipo) {
      if (tipo === 'levantamento') {
        const [h, m] = document.getElementById('selectHoraLev').value.split(':');
        calHoraLev = { h: parseInt(h), m: parseInt(m) };
        if (calDataLev) document.getElementById('displayLevantamento').textContent = calFmt(calDataLev, calHoraLev);
      } else {
        const [h, m] = document.getElementById('selectHoraDev').value.split(':');
        calHoraDev = { h: parseInt(h), m: parseInt(m) };
        if (calDataDev) document.getElementById('displayDevolucao').textContent = calFmt(calDataDev, calHoraDev);
      }
      calCalcularResumo();
    }

    function calToStr(d, hora) {
      if (!d) return null;
      const mm = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      const hh = String(hora.h).padStart(2,'0');
      const mi = String(hora.m).padStart(2,'0');
      return `${d.getFullYear()}-${mm}-${dd}T${hh}:${mi}`;
    }

    function calFmt(d, hora) {
      if (!d) return null;
      const hh = String(hora.h).padStart(2,'0');
      const mi = String(hora.m).padStart(2,'0');
      return d.toLocaleDateString('pt-PT', { day:'2-digit', month:'short', year:'numeric' }) + ' ' + hh + ':' + mi;
    }

    function calAbrirPicker(modo) {
      calSelecionar = modo;
      const hoje = new Date();
      calMes = hoje.getMonth();
      calAno = hoje.getFullYear();
      if (modo === 'devolucao' && calDataLev) {
        calMes = calDataLev.getMonth();
        calAno = calDataLev.getFullYear();
      }
      document.getElementById('boxLevantamento').classList.toggle('active', modo === 'levantamento');
      document.getElementById('boxDevolucao').classList.toggle('active', modo === 'devolucao');
      document.getElementById('calHint').textContent = modo === 'levantamento'
        ? 'Seleciona a data de levantamento'
        : 'Seleciona a data de devolução';

      calRenderMes();
    }

    function calNavMes(dir) {
      calMes += dir;
      if (calMes > 11) { calMes = 0; calAno++; }
      if (calMes < 0)  { calMes = 11; calAno--; }
      calRenderMes();
    }

    function calRenderMes() {
      const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
      document.getElementById('calMonthLabel').textContent = `${meses[calMes]} ${calAno}`;

      const hoje     = new Date(); hoje.setHours(0,0,0,0);
      const primeiro = new Date(calAno, calMes, 1);
      const ultimo   = new Date(calAno, calMes+1, 0).getDate();
      const inicioSemana = primeiro.getDay();

      let html = '';
      for (let i = 0; i < inicioSemana; i++) html += '<div class="cal-day empty"></div>';

      for (let d = 1; d <= ultimo; d++) {
        const data = new Date(calAno, calMes, d);
        data.setHours(0,0,0,0);

        const isHoje     = data.getTime() === hoje.getTime();
        const isPassado  = data < hoje && !isHoje;
        const isLev      = calDataLev && data.getTime() === calDataLev.getTime();
        const isDev      = calDataDev && data.getTime() === calDataDev.getTime();
        const isInRange  = calDataLev && calDataDev && data > calDataLev && data < calDataDev;
        const isDisabled = isPassado || (calSelecionar === 'devolucao' && calDataLev && data <= calDataLev);

        let cls = 'cal-day';
        if (isDisabled) cls += ' disabled';
        if (isHoje)     cls += ' today';
        if (isLev)      cls += ' start';
        if (isDev)      cls += ' end';
        if (isInRange)  cls += ' in-range';

        html += `<div class="${cls}" ${isDisabled ? '' : `onclick="calSelecionarDia(${calAno},${calMes},${d})"`}>${d}</div>`;
      }
      document.getElementById('calDays').innerHTML = html;
    }

    function calSelecionarDia(ano, mes, dia) {
      const data = new Date(ano, mes, dia);
      if (calSelecionar === 'levantamento') {
        calDataLev = data;
        if (calDataDev && calDataDev <= calDataLev) calDataDev = null;
        document.getElementById('displayLevantamento').textContent = calFmt(data, calHoraLev);
        document.getElementById('displayLevantamento').classList.remove('placeholder');

        calAbrirPicker('devolucao');
      } else {
        calDataDev = data;
        document.getElementById('displayDevolucao').textContent = calFmt(data, calHoraDev);
        document.getElementById('displayDevolucao').classList.remove('placeholder');
        document.getElementById('boxLevantamento').classList.remove('active');
        document.getElementById('boxDevolucao').classList.remove('active');

        document.getElementById('calHint').textContent = 'Datas selecionadas ✓';
      }
      calRenderMes();
      calCalcularResumo();
    }

    function calCalcularResumo() {
      const btn = document.getElementById('btnConfirmarReserva');
      if (!calDataLev || !calDataDev) {
        document.getElementById('resumoReserva').style.display = 'none';
        btn.disabled = true; btn.style.opacity = '0.5';
        return;
      }
      const msPerDay = 1000*60*60*24;
      const dias = Math.round((calDataDev - calDataLev) / msPerDay);
      if (dias <= 0) return;
      const precoDia = veiculoSelecionado.precoDiario;
      const total = dias * precoDia;
      document.getElementById('resumoDias').textContent     = `${dias} dia${dias > 1 ? 's' : ''}`;
      document.getElementById('resumoPrecoDia').textContent = `${precoDia}€`;
      document.getElementById('resumoTotal').textContent    = `${total.toFixed(2)}€`;
      document.getElementById('resumoReserva').style.display = 'block';
      btn.disabled = false; btn.style.opacity = '1';
    }

    function abrirReserva(veiculo) {
      if (!utilizadorLogado) { window.location.href = 'login.html'; return; }
      veiculoSelecionado = veiculo;
      calDataLev = null; calDataDev = null;
      calHoraLev = { h: 9, m: 0 };
      calHoraDev = { h: 9, m: 0 };

      document.getElementById('selectHoraLev').value = "9:00";
      document.getElementById('selectHoraDev').value = "9:00";

      document.getElementById('modalVeiculoNome').textContent  = `${veiculo.marca} ${veiculo.modelo}`;
      document.getElementById('modalVeiculoPreco').textContent = `${veiculo.precoDiario}€ / dia`;
      document.getElementById('modalErro').style.display    = 'none';
      document.getElementById('modalSucesso').style.display = 'none';
      document.getElementById('resumoReserva').style.display = 'none';
      document.getElementById('displayLevantamento').textContent = 'Escolher data';
      document.getElementById('displayLevantamento').className   = 'cal-input-val placeholder';
      document.getElementById('displayDevolucao').textContent    = 'Escolher data';
      document.getElementById('displayDevolucao').className      = 'cal-input-val placeholder';
      document.getElementById('btnConfirmarReserva').disabled    = true;
      document.getElementById('btnConfirmarReserva').style.opacity = '0.5';
      document.getElementById('boxLevantamento').classList.remove('active');
      document.getElementById('boxDevolucao').classList.remove('active');

      calAbrirPicker('levantamento');
      document.getElementById('modalReserva').classList.add('open');
    }

    function fecharReserva() { document.getElementById('modalReserva').classList.remove('open'); }

    function confirmarReserva() {
      const erro    = document.getElementById('modalErro');
      const sucesso = document.getElementById('modalSucesso');
      erro.style.display = sucesso.style.display = 'none';

      if (!calDataLev || !calDataDev) {
        erro.innerText = 'Seleciona as duas datas!';
        erro.style.display = 'block';
        return;
      }

      const params = new URLSearchParams({
        idVeiculo:        veiculoSelecionado.id,
        idCliente:        utilizadorLogado.id,
        dataLevantamento: calToStr(calDataLev, calHoraLev),
        dataDevolucao:    calToStr(calDataDev, calHoraDev)
      });

      apiFetch('/alugueres?' + params, { method: 'POST' })
        .then(res => { if (!res.ok) return res.text().then(m => { throw new Error(m); }); return res.json(); })
        .then(() => {
          sucesso.innerText = '✅ Reserva feita com sucesso!';
          sucesso.style.display = 'block';
          document.getElementById('btnConfirmarReserva').disabled = true;
          setTimeout(() => { fecharReserva(); carregarVeiculos(); }, 1800);
        })
        .catch(err => { erro.innerText = err.message || 'Erro ao fazer reserva!'; erro.style.display = 'block'; });
    }

    carregarDropdownsHoras();
    carregarVeiculos();
  </script>
</body>
</html>
