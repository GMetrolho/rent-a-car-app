<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AutoRent — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .main-wrapper { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 16px; }
    .auth-card { background:#fff; border:1px solid var(--border); border-radius:16px; padding:40px; width:100%; max-width:420px; }
    .auth-card h1 { font-size:22px; font-weight:600; color:var(--text); margin-bottom:4px; }
    .auth-card .sub { font-size:14px; color:var(--text-muted); margin-bottom:28px; }
    .btn-entrar { background:var(--blue); color:#fff; border:none; border-radius:8px; padding:12px; font-size:15px; font-weight:500; width:100%; cursor:pointer; transition:background 0.2s; margin-top:8px; }
    .btn-entrar:hover { background:#1d4ed8; }
    .btn-criar { background:transparent; color:var(--orange); border:1.5px solid var(--orange); border-radius:8px; padding:11px; font-size:14px; font-weight:500; width:100%; cursor:pointer; transition:all 0.2s; text-align:center; text-decoration:none; display:block; }
    .btn-criar:hover { background:var(--orange); color:#fff; }
    .divider { display:flex; align-items:center; gap:12px; margin:20px 0; color:var(--text-muted); font-size:13px; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }
  </style>
</head>
<body>

  <nav class="navbar">
    <a class="navbar-brand" href="index.html">
      <svg viewBox="0 0 24 24"><path d="M5 11l1.5-4.5h11L19 11M3 17h1v1a1 1 0 002 0v-1h12v1a1 1 0 002 0v-1h1v-5l-2-6H5L3 12v5zm2.5-3a1 1 0 110-2 1 1 0 010 2zm9 0a1 1 0 110-2 1 1 0 010 2z"/></svg>
      AutoRent
    </a>
  </nav>

  <div class="main-wrapper">
    <div class="auth-card">
      <h1>Bem-vindo de volta</h1>
      <p class="sub">Entra na tua conta para continuar</p>

      <div class="alert-erro" id="erro"></div>

      <div class="mb-3">
        <label class="form-label-custom">Email</label>
        <input type="email" class="form-control-custom" id="email" placeholder="email@exemplo.com"/>
      </div>
      <div class="mb-3">
        <label class="form-label-custom">Password</label>
        <input type="password" class="form-control-custom" id="password" placeholder="Mínimo 8 caracteres"/>
      </div>

      <button class="btn-entrar" onclick="fazerLogin()">Entrar</button>
      <div class="divider">ou</div>
      <a class="btn-criar" href="register.html">Criar conta</a>
    </div>
  </div>

  <script>
    const u = sessionStorage.getItem('utilizador');
    if (u) {
        const cargo = JSON.parse(u).cargo;
      if (cargo === 'ADMIN') {
        window.location.href = 'admin_dashboard.html';
      } else if (cargo === 'FUNCIONARIO') {
        window.location.href = 'dashboard.html';
      } else {
        window.location.href = 'index.html';
      }
    }

    function fazerLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const erro     = document.getElementById('erro');
      erro.style.display = 'none';

      if (!email || !password) {
        erro.innerText = 'Preenche todos os campos!';
        erro.style.display = 'block';
        return;
      }

      fetch(`/utilizadores/login?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`, { method: 'POST' })
        .then(res => {
          if (!res.ok) return res.text().then(msg => { throw new Error(msg); });
          return res.json();
        })
        .then(utilizador => {
          sessionStorage.setItem('utilizador', JSON.stringify(utilizador));
          if (utilizador.cargo === 'ADMIN') {
            window.location.href = 'admin_dashboard.html';
          } else if (utilizador.cargo === 'FUNCIONARIO') {
            window.location.href = 'dashboard.html';
          } else {
           window.location.href = 'index.html';
          }
        })
        .catch(err => {
          erro.innerText = err.message || 'Email ou password incorretos!';
          erro.style.display = 'block';
        });
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') fazerLogin(); });
  </script>
</body>
</html>
